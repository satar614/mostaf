    <main class="main9">
  <form action="#" method="POST">
  <h2>CTR Restaurant - Reservation Form</h2>

  <div class="form-group">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required>
  </div>

  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="example@email.com" required>
  </div>

  <div class="form-group">
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" placeholder="+252...">
  </div>

  <div class="form-group">
    <label for="date">Reservation Date:</label>
    <input type="date" id="date" name="date">
  </div>

  <div class="form-group">
    <label>Gender:  </label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="male" checked> Male</label> <br>
      <label><input type="radio" name="gender" value="female"> Female</label>
    </div>
  </div>

  <div class="form-group">
    <label>Services Needed:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="services" value="delivery"> Delivery</label>
      <label><input type="checkbox" name="services" value="reservation"> Table Reservation</label>
      <label><input type="checkbox" name="services" value="catering"> Catering</label>
    </div>
  </div>

  <div class="form-group">
    <label for="city">City:</label>
    <select id="city" name="city">
      <option value="">-- Select City --</option>
      <option value="mogadishu">Mogadishu</option>
      <option value="hargeisa">Hargeisa</option>
      <option value="kismayo">Kismayo</option>
    </select>
  </div>

  <div class="form-group">
    <label for="message">Message:</label>
    <textarea id="message" name="message" placeholder="Write your message here..."></textarea>
  </div>

  <button type="submit">Submit</button>
  <button type="reset">Reset</button>
</form>
